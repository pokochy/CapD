id: ssti-basic
info:
  name: 'Server-Side Template Injection'
  severity: 'critical'
  description: '템플릿 엔진이 사용자 입력을 그대로 렌더링할 때 발생하는 취약점. 수식 계산 결과가 응답에 반사되면 취약'

definition:
  method: ['GET', 'POST']
  position: ['query', 'body', 'form_field']

payloads:
  - '{{7*7}}'          # Jinja2, Twig (결과: 49)
  - '${7*7}'           # Freemarker, Thymeleaf (결과: 49)
  - '#{7*7}'           # Ruby ERB (결과: 49)
  - '<%= 7*7 %>'       # EJS, ERB (결과: 49)
  - '{{7*"7"}}'        # Jinja2 문자열 곱셈 (결과: 7777777)
  - '*{7*7}'           # Spring Expression (결과: 49)

matchers-condition: or

matchers:
  - type: regex
    regex:
      - '(?<![0-9])49(?![0-9])'
      - '7777777'
  - type: regex
    regex:
      - '(?<![0-9])49(?![0-9])'   # 숫자 49 단독 등장 (다른 숫자에 붙어있는 것 제외)
