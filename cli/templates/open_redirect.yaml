id: open-redirect
info:
  name: 'Open Redirect'
  severity: 'medium'
  description: '검증 없이 사용자 입력 URL로 리다이렉트할 때 발생하는 취약점. 피싱 공격에 악용 가능'

definition:
  method: ['GET']
  position: ['query']

payloads:
  - 'https://evil.com'
  - '//evil.com'
  - '/\evil.com'
  - 'https://evil.com%2F@legit.com'   # URL 파싱 우회
  - '/%09/evil.com'                    # 탭 문자 우회

matchers-condition: and

matchers:
  - type: status
    status: [301, 302, 303, 307, 308]  # 리다이렉트 응답코드

  - type: word
    words:
      - 'evil.com'      # Location 헤더에 공격자 도메인 포함
